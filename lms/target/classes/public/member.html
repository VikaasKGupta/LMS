<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Dashboard | LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; color: #1a202c; padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header h1 { color: #2b6cb0; }
        .logout-btn { background-color: #e53e3e; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: bold;}
        
        #statusMessage { margin-bottom: 20px; font-weight: bold; text-align: center; font-size: 16px; min-height: 20px;}

        /* Section Titles */
        .section-title { font-size: 22px; color: #2d3748; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;}

        /* Borrowed Books Table Styles */
        .borrowed-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .borrowed-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .borrowed-table th, .borrowed-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .borrowed-table th { background-color: #f7fafc; color: #4a5568; font-weight: 600; }
        
        .return-btn { padding: 8px 15px; background-color: #ed8936; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; }
        .return-btn:hover { background-color: #dd6b20; }

        /* Catalog Grid Styles */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .book-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s;}
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .book-title { font-size: 18px; font-weight: 700; color: #2d3748; margin-bottom: 5px; }
        .book-author { font-size: 14px; color: #718096; margin-bottom: 15px; }
        .stock-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 15px;}
        .in-stock { background-color: #ebf8f6; color: #319795; }
        .out-of-stock { background-color: #fff5f5; color: #e53e3e; }
        .borrow-btn { width: 100%; padding: 10px; background-color: #3182ce; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; }
        .borrow-btn:hover { background-color: #2b6cb0; }
        .borrow-btn:disabled { background-color: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Member Portal</h1>
        <a href="/" class="logout-btn" onclick="localStorage.clear()">Logout</a>
    </div>

    <div id="statusMessage"></div>

    <div class="borrowed-card">
        <h2 class="section-title">📖 My Borrowed Books</h2>
        <table class="borrowed-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Due Date</th>
                </tr>
            </thead>
            <tbody id="borrowedBody">
                </tbody>
        </table>
    </div>

    <h2 class="section-title" style="margin-top: 40px;">📚 Library Catalog</h2>
    <div class="catalog-grid" id="catalogBody">
        </div>

    <script>
        // Get the logged-in user!
        const userId = localStorage.getItem('userId');

        // Security Check: Kick them out if they bypassed the login screen
        if (!userId) {
            alert("Security Error: No user logged in.");
            window.location.href = '/';
        }

        // ==========================================
        // 1. LOAD BORROWED BOOKS (Read-Only Now!)
        // ==========================================
        async function loadBorrowedBooks() {
            const tableBody = document.getElementById('borrowedBody');
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Loading...</td></tr>';

            try {
                const response = await fetch(`/api/borrowed/${userId}`);
                const books = await response.json();

                tableBody.innerHTML = ''; 

                if (books.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#718096;">You currently have no borrowed books.</td></tr>';
                    return;
                }

                books.forEach(book => {
                    // Removed the Return Button!
                    const row = `
                        <tr>
                            <td><strong>${book.title}</strong><br><span style="font-size:12px; color:#a0aec0;">ID: ${book.bookId}</span></td>
                            <td>${book.author}</td>
                            <td style="color:#e53e3e; font-weight:600;">${book.dueDate}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">Failed to load borrowed books.</td></tr>';
            }
        }
        
        

       

        // ==========================================
        // 3. LOAD CATALOG & BORROW LOGIC
        // ==========================================
        async function loadCatalog() {
            const catalogDiv = document.getElementById('catalogBody');
            try {
                const response = await fetch('/api/books');
                const books = await response.json();
                catalogDiv.innerHTML = ''; 

                if (books.length === 0) {
                    catalogDiv.innerHTML = '<p>The library is currently empty.</p>';
                    return;
                }

                books.forEach(book => {
                    const isAvailable = book.available > 0;
                    const badgeClass = isAvailable ? 'in-stock' : 'out-of-stock';
                    const badgeText = isAvailable ? `${book.available} Available` : 'Out of Stock';
                    
                    catalogDiv.innerHTML += `
                        <div class="book-card">
                            <div>
                                <div class="book-title">${book.title}</div>
                                <div class="book-author">by ${book.author}</div>
                                <div class="stock-badge ${badgeClass}">${badgeText}</div>
                            </div>
                            <button class="borrow-btn" ${isAvailable ? '' : 'disabled'} 
                                onclick="borrowBook('${book.id}', '${book.title}')">
                                ${isAvailable ? 'Borrow Book' : 'Unavailable'}
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                catalogDiv.innerHTML = '<p style="color:red;">Failed to load catalog.</p>';
            }
        }

        async function borrowBook(bookId, bookTitle) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.style.color = "#4a5568";
            statusMsg.innerText = `Processing checkout for "${bookTitle}"...`;

            try {
                const response = await fetch('/api/borrow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, bookId: bookId })
                });
                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    statusMsg.style.color = "#38a169";
                    statusMsg.innerText = `✅ Success! You have borrowed "${bookTitle}".`;
                    
                    // REFRESH BOTH DASHBOARDS!
                    loadBorrowedBooks(); 
                    loadCatalog(); 
                } else {
                    statusMsg.style.color = "#e53e3e";
                    statusMsg.innerText = "❌ " + data.message;
                }
            } catch (error) {
                statusMsg.style.color = "#e53e3e";
                statusMsg.innerText = "❌ Server connection failed.";
            }
        }

        // ==========================================
        // INITIALIZE PAGE
        // ==========================================
        window.onload = () => {
            loadBorrowedBooks();
            loadCatalog();
        };
    </script>

</body>
</html>
