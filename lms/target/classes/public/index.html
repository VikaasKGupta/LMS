<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (Keep your existing CSS for body, login-box, input, and button exactly the same) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; }
        .login-box { background-color: white; padding: 40px 30px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .login-box h2 { margin-bottom: 25px; color: #1a202c; font-weight: 700; font-size: 24px; }
        
        /* NEW: Styles for the Role Selector */
        .role-selector { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 14px; color: #4a5568; }
        .role-selector label { display: flex; align-items: center; cursor: pointer; }
        .role-selector input { width: auto; margin: 0 8px 0 0; cursor: pointer; }

        input[type="email"], input[type="password"] { width: 100%; padding: 12px 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; transition: border-color 0.3s ease; }
        input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15); }
        button { width: 100%; padding: 12px; background-color: #3182ce; color: white; font-weight: 600; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; transition: background-color 0.3s ease, transform 0.1s ease; }
        button:hover { background-color: #2b6cb0; }
        button:active { transform: scale(0.98); }
        #message { margin-top: 20px; font-weight: 500; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Library Portal</h2>
        
        <div class="role-selector">
            <label><input type="radio" name="role" value="member" checked> Member</label>
            <label><input type="radio" name="role" value="librarian"> Librarian</label>
        </div>

        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="attemptLogin()">Sign In</button>
        <div id="message"></div>
    </div>

    <script>
        async function attemptLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            // NEW: Read which radio button is currently checked
            const role = document.querySelector('input[name="role"]:checked').value;
            
            const messageDiv = document.getElementById('message');
            const btn = document.querySelector('button');

            btn.innerText = "Signing in...";
            btn.disabled = true;
            messageDiv.style.color = "#4a5568";
            messageDiv.innerText = "";

            try {
                const response = await fetch('/api/login', { //fetch('http://localhost:7070/api/login'
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // NEW: We are now sending the role variable to Java!
                    body: JSON.stringify({ email: email, password: password, role: role }) 
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    messageDiv.style.color = "#38a169"; 
                    messageDiv.innerText = "✅ Success! Redirecting...";
                    localStorage.setItem('userId', data.userId);
                   // localStorage.setItem('userRole', data.role);
                    // NEW: Redirect the user based on their role!
                    setTimeout(() => {
                        if (data.role === 'librarian') {
                            window.location.href = '/librarian.html';
                        } else {
                            window.location.href = '/member.html'; // We will build this later
                        }
                    }, 1000);
                } else {
                    messageDiv.style.color = "#e53e3e"; 
                    messageDiv.innerText = "❌ " + data.message;
                }
            } catch (error) {
                messageDiv.style.color = "#e53e3e";
                messageDiv.innerText = "❌ Unable to connect to server.";
            } finally {
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
